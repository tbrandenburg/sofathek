services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "${SOFATHEK_BACKEND_PORT:-3010}:${SOFATHEK_BACKEND_PORT:-3010}"
    environment:
      - NODE_ENV=development
      - SOFATHEK_BACKEND_PORT=${SOFATHEK_BACKEND_PORT:-3010}
      - PORT=${SOFATHEK_BACKEND_PORT:-3010}
      - VIDEOS_DIR=/app/data/videos
      - TEMP_DIR=/app/data/temp
    volumes:
      # Bind mount for development hot reload
      - ./backend/src:/app/src:ro
      - ./backend/package.json:/app/package.json:ro
      - ./backend/tsconfig.json:/app/tsconfig.json:ro
      # Named volumes for data persistence
      - sofathek_videos:/app/data/videos
      - sofathek_temp:/app/data/temp
      - sofathek_logs:/app/logs
      # Cache node_modules for faster rebuilds
      - /app/node_modules
    networks:
      - sofathek_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${SOFATHEK_BACKEND_PORT:-3010}/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Frontend with Playwright E2E testing support
  frontend:
    image: mcr.microsoft.com/playwright:v1.58.2-focal
    working_dir: /app
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "${SOFATHEK_FRONTEND_PORT:-5183}:${SOFATHEK_FRONTEND_PORT:-5183}"
    environment:
      - CI=true
      - SOFATHEK_FRONTEND_PORT=${SOFATHEK_FRONTEND_PORT:-5183}
    command: sh -c "npm install && npx playwright install && npm run dev -- --host 0.0.0.0 --port ${SOFATHEK_FRONTEND_PORT:-5183}"
    depends_on:
      - backend
    networks:
      - sofathek_network

  # Playwright test runner service
  e2e-tests:
    image: mcr.microsoft.com/playwright:v1.58.2-focal
    working_dir: /app
    volumes:
      - ./frontend:/app
      - ./frontend/test-results:/app/test-results
    environment:
      - CI=true
    command: sh -c "npm install && npx playwright install && npx playwright test"
    depends_on:
      - frontend
      - backend
    networks:
      - sofathek_network
    profiles:
      - testing

volumes:
  sofathek_videos:
    driver: local
  sofathek_temp:
    driver: local
  sofathek_logs:
    driver: local

networks:
  sofathek_network:
    driver: bridge