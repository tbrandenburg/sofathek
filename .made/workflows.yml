workflows:
- id: wf_mmozh3te_a0828
  name: Continuous Issue Resolution
  enabled: true
  schedule: 0 */3 * * *
  steps:
  - type: bash
    run: gh issue list --limit 1 --state open | grep -q . || return 42
  - type: bash
    run: git switch main && git pull --rebase --autostash
  - type: agent
    agent: build
    prompt: Follow the instructions in @.opencode/commands/prp-issue-fix.md for the
      latest open issue on Github and take its investigation comment as the implementation
      plan, but also check if there is already a related PR to continue.
  - type: agent
    agent: build
    prompt: Follow the instructions in @.opencode/commands/commit-push.md
  - type: agent
    agent: build
    prompt: 'Get the latest open Github issue and its related PR: Only the PR shows
      merge issues follow the instructions in @.opencode/commands/resolve-ci-errors.md'
  - type: agent
    agent: build
    prompt: 'Get the latest open Github issue and its related PR: Follow the instructions
      in @.opencode/commands/prp-review.md for the PR'
  - type: agent
    agent: build
    prompt: 'Get the latest open Github issue and its related PR: Raise new Github
      issues with `gh` CLI if the PR review comments came up with high or critical
      priority findings, failing CI or merge blockers. Then, try to merge it. If any
      PR was processed, send a telegram message on the outcome.'
  - type: bash
    run: git switch main && git pull --rebase --autostash
  shellScriptPath: .harness/continuous-issue-resolution.sh
