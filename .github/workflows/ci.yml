name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop, 'feature/**' ]
  pull_request:
    branches: [ main ]

env:
  NODE_VERSION: '20.x'

jobs:
  # Level 1: Static Analysis
  static-analysis:
    name: '🔍 Level 1: Static Analysis'
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Run TypeScript type checking
        run: make type-check
        
      - name: Run ESLint
        run: make lint

  # Level 2: Build and Functional
  build-functional:
    name: '🔨 Level 2: Build & Functional'
    runs-on: ubuntu-latest
    needs: static-analysis
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
            
      - name: Install dependencies
        run: npm ci
        
      - name: Build applications
        run: make build
        
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: |
            backend/dist/
            frontend/dist/
          retention-days: 7

  # Level 3: Unit Tests  
  unit-tests:
    name: '🧪 Level 3: Unit Tests'
    runs-on: ubuntu-latest
    needs: static-analysis
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
            
      - name: Install dependencies
        run: npm ci
        
      - name: Run unit tests with coverage
        run: npm run test:coverage
          
      - name: Upload coverage reports
        uses: actions/upload-artifact@v4
        with:
          name: coverage-reports
          path: |
            backend/coverage/
            frontend/coverage/
          retention-days: 30

  # Level 4: E2E Tests
  e2e-tests:
    name: '🎭 Level 4: E2E Tests'
    runs-on: ubuntu-latest
    needs: [build-functional, unit-tests]
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
            
      - name: Install dependencies
        run: npm ci
        
      - name: Install Playwright browsers
        run: make playwright-install
        
      - name: Start development servers in background
        run: |
          echo "Starting servers with simplified approach..."
          
          # Build frontend first
          cd frontend && npm run build
          echo "Frontend built successfully"
          
          # Start backend server
          cd backend && PORT=3010 npm run dev &
          sleep 3
          
          # Start frontend with built files
          cd frontend && python3 -m http.server 5183 --directory dist &
          sleep 3
          
          # Simple health checks with shorter timeouts
          echo "Quick health checks..."
          
          # Backend check (simpler)
          for i in {1..10}; do
            if curl -f -s http://localhost:3010/health >/dev/null 2>&1; then
              echo "✅ Backend responding"
              break
            fi
            sleep 2
          done
          
          # Frontend check (simpler)
          for i in {1..10}; do
            if curl -f -s http://localhost:5183 >/dev/null 2>&1; then
              echo "✅ Frontend responding"
              break
            fi
            sleep 2
          done
          
          # Final status check
          echo "Server status:"
          curl -s http://localhost:3010/health | head -1 || echo "Backend check failed"
          curl -s -I http://localhost:5183 | head -1 || echo "Frontend check failed"
          echo "Servers started, proceeding with tests"
          
      - name: Run Playwright E2E tests
        run: |
          echo "Running simplified E2E smoke tests..."
          cd frontend && npx playwright test simple-smoke.spec.ts smoke-simple.spec.ts --timeout=90000
          
      - name: Cleanup background servers
        if: always()
        run: |
          echo "Cleaning up background processes..."
          pkill -f "PORT=3010" || echo "No backend processes to kill"
          pkill -f "python3 -m http.server 5183" || echo "No frontend processes to kill"
          sleep 2
        
      - name: Upload Playwright test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 30
          
      - name: Upload Playwright test videos
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-videos
          path: frontend/test-results/
          retention-days: 7

  # Level 5: Integration Tests
  integration:
    name: '🔗 Level 5: Integration'
    runs-on: ubuntu-latest
    needs: [e2e-tests]
    if: success()
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
            
      - name: Install dependencies
        run: npm ci
        
      - name: Build for production
        run: make build
        
      - name: Start production servers in background
        run: |
          make start &
          sleep 30  # Wait for servers to start
          
      - name: Health check validation
        run: |
          # Test backend health endpoint
          curl -f http://localhost:3010/health || exit 1
          
          # Test frontend serves static files
          curl -f http://localhost:5183 || exit 1
          
      - name: Stop servers
        run: make stop

  # Summary job for status checks
  ci-success:
    name: '✅ CI Pipeline Complete'
    runs-on: ubuntu-latest
    needs: [static-analysis, build-functional, unit-tests, e2e-tests, integration]
    if: success()
    
    steps:
      - name: CI Pipeline Success
        run: |
          echo "🎉 All CI pipeline levels completed successfully!"
          echo "✅ Level 1: Static Analysis - PASSED"
          echo "✅ Level 2: Build & Functional - PASSED"  
          echo "✅ Level 3: Unit Tests - PASSED"
          echo "✅ Level 4: E2E Tests - PASSED"
          echo "✅ Level 5: Integration - PASSED"