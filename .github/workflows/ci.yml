name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

# Optimize: Avoid running duplicate jobs for push + PR
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '24.x'
  YOUTUBE_DL_SKIP_DOWNLOAD: 'true'

jobs:
  # Level 1: Static Analysis
  static-analysis:
    name: '🔍 Level 1: Static Analysis'
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci

      - name: Run TypeScript type checking
        run: make type-check
        
      - name: Run ESLint
        run: make lint

  # Level 2: Build and Functional
  build-functional:
    name: '🔨 Level 2: Build & Functional'
    runs-on: ubuntu-latest
    needs: static-analysis
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
            
      - name: Install dependencies
        run: npm ci

      - name: Build applications
        run: make build
        
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: |
            backend/dist/
            frontend/dist/
          retention-days: 7

  # Level 3: Unit Tests
  unit-tests:
    name: '🧪 Level 3: Unit Tests'
    runs-on: ubuntu-latest
    needs: static-analysis
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run backend unit tests
        run: |
          cd backend
          npm run test:unit
      
      - name: Run frontend unit tests
        run: |
          cd frontend
          npm test

  # Level 4: E2E Tests
  e2e-tests:
    name: '🎭 Level 4: E2E Tests'
    runs-on: ubuntu-latest
    needs: [build-functional, unit-tests]
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
            
      - name: Install dependencies
        run: npm ci

      - name: Install yt-dlp system binary
        run: |
          pip install --upgrade pip
          pip install yt-dlp
          # Create symlink for youtube-dl-exec package to find yt-dlp binary
          mkdir -p backend/node_modules/youtube-dl-exec/bin
          which yt-dlp
          ln -sf "$(which yt-dlp)" backend/node_modules/youtube-dl-exec/bin/yt-dlp
          echo "yt-dlp symlinked to $(readlink -f backend/node_modules/youtube-dl-exec/bin/yt-dlp)"
        timeout-minutes: 5
        
      - name: Install Playwright browsers
        run: make playwright-install
        
      - name: Prepare for E2E tests
        env:
          VIDEOS_DIR: /tmp/sofathek-videos
          TEMP_DIR: /tmp/sofathek-temp
          NODE_ENV: development
        run: |
          echo "Preparing environment for E2E tests..."
          
          # Create temp directories
          mkdir -p /tmp/sofathek-videos /tmp/sofathek-temp
          
          # Clean any existing processes to prevent conflicts
          echo "Cleaning existing processes..."
          pkill -f "npm.*3010" 2>/dev/null || true
          pkill -f "vite.*5183" 2>/dev/null || true
          sleep 2
          
          echo "Environment prepared. Servers will be started in E2E test step."
          
      - name: Run Playwright E2E tests
        env:
          VIDEOS_DIR: /tmp/sofathek-videos
          TEMP_DIR: /tmp/sofathek-temp
          NODE_ENV: development
        run: |
          echo "Starting fresh servers for E2E tests..."
          
          # Create required temp directories
          mkdir -p /tmp/sofathek-videos /tmp/sofathek-temp
          
          # Clean any existing processes to avoid conflicts
          echo "Cleaning existing processes..."
          pkill -f "npm.*3010" 2>/dev/null || true
          pkill -f "vite.*5183" 2>/dev/null || true
          sleep 2
          
           # Start backend server in background for this step
           echo "Starting backend server..."
           cd backend
           PORT=3010 npm run dev &
           BACKEND_PID=$!
           echo "Backend PID: $BACKEND_PID"
           echo $BACKEND_PID > ../backend.pid
           cd ../
           
           # Start frontend server in background for this step  
           echo "Starting frontend server..."
           cd frontend
           PORT=5183 npm run dev &
           cd ../
          
          # Wait for servers to start with health checks
          echo "Waiting for servers to initialize..."
          sleep 10
          
          # Backend health check
          echo "Testing backend connectivity..."
          for i in {1..30}; do
            if curl -f -s http://localhost:3010/health > /dev/null; then
              echo "✅ Backend is responding"
              break
            fi
            echo "Backend check $i/30..."
            sleep 2
            if [ $i -eq 30 ]; then
              echo "❌ Backend failed to start"
              echo "Backend log:"
              tail -20 ../e2e-backend.log 2>/dev/null || echo "No backend log"
              exit 1
            fi
          done
          
          # Frontend health check
          echo "Testing frontend connectivity..."
          for i in {1..30}; do
            if curl -f -s -I http://localhost:5183 > /dev/null; then
              echo "✅ Frontend is responding"
              break
            fi
            echo "Frontend check $i/30..."
            sleep 2
            if [ $i -eq 30 ]; then
              echo "❌ Frontend failed to start"
              echo "Frontend log:"
              tail -20 ../e2e-frontend.log 2>/dev/null || echo "No frontend log"
              exit 1
            fi
          done
          
          # Final server verification
          echo "Final server status:"
          curl -f http://localhost:3010/health && echo "Backend OK"
          curl -f -I http://localhost:5183 && echo "Frontend OK"
          
          # Set CI environment for Playwright
          export CI=true
          
          echo "========== PRE-TEST SERVER VERIFICATION =========="
          
          # Detailed server status check immediately before tests
          echo "Checking server processes..."
          ps aux | grep -E "(npm run dev|node.*dev)" | grep -v grep || echo "No dev processes found"
          
          echo "Checking port binding..."
          sudo netstat -tlnp | grep -E ":3010|:5183" || echo "No processes bound to target ports"
          
          echo "Checking process tree..."
          pstree -p $$ || echo "pstree not available"
          
          # Environment debugging
          echo "Environment variables:"
          env | grep -E "(NODE_|PORT|CI|npm)" | sort
          
          # Verify servers are ACTUALLY accessible right now
          echo "Testing backend connectivity with verbose output..."
          curl -v -f -m 10 http://localhost:3010/health || {
            echo "❌ BACKEND UNREACHABLE! Attempting restart..."
            
            # Show backend logs
            echo "Backend log (last 50 lines):"
            tail -50 ../e2e-backend.log 2>/dev/null || echo "No backend log found"
            
            # Restart backend
            cd backend
             echo "Restarting backend server..."
             PORT=3010 npm run dev &
             cd ../
            
            # Wait for restart
            sleep 15
            for i in {1..20}; do
              if curl -f -s http://localhost:3010/health > /dev/null; then
                echo "✅ Backend restart successful"
                break
              fi
              echo "Backend restart check $i/20..."
              sleep 3
              if [ $i -eq 20 ]; then
                echo "❌ Backend restart failed"
                echo "Restart log:"
                tail -20 ../e2e-backend-restart.log 2>/dev/null || echo "No restart log"
                exit 1
              fi
            done
          }
          
          echo "Testing frontend connectivity with verbose output..."
          curl -v -f -I -m 10 http://localhost:5183 || {
            echo "❌ FRONTEND UNREACHABLE! Attempting restart..."
            
            # Show frontend logs  
            echo "Frontend log (last 50 lines):"
            tail -50 ../e2e-frontend.log 2>/dev/null || echo "No frontend log found"
            
             # Restart frontend
             cd frontend
             echo "Restarting frontend server..."
             PORT=5183 npm run dev &
            
            # Wait for restart
            sleep 15
            for i in {1..20}; do
              if curl -f -s -I http://localhost:5183 > /dev/null; then
                echo "✅ Frontend restart successful"
                break
              fi
              echo "Frontend restart check $i/20..."
              sleep 3
              if [ $i -eq 20 ]; then
                echo "❌ Frontend restart failed"
                echo "Restart log:"
                tail -20 ../e2e-frontend-restart.log 2>/dev/null || echo "No restart log"
                exit 1
              fi
            done
          }
          
          echo "Final server verification after restarts..."
          curl -f http://localhost:3010/health && echo "✅ Backend is responding"
          curl -f -I http://localhost:5183 && echo "✅ Frontend is responding"
          
           echo "========== STARTING E2E TESTS =========="
           
           echo "Running E2E tests from frontend directory..."
           cd frontend
           
            # Run minimal CI tests first with error handling
            echo "Starting minimal CI tests..."
            if ! npx playwright test tests/ci-minimal.spec.ts \
              --timeout=60000 \
              --reporter=list,html \
              --max-failures=1 \
              --retries=1; then
              
            echo "❌ CI-minimal tests FAILED! Collecting debug info..."
            
            # Show server status after failure
            echo "Server processes after test failure:"
            ps aux | grep -E "(npm run dev|node.*dev)" | grep -v grep || echo "No dev processes found"
            
            # Show port status after failure
            echo "Port status after test failure:"
            sudo netstat -tlnp | grep -E ":3010|:5183" || echo "No processes bound to target ports"
            
            # Test connectivity after failure
            echo "Testing connectivity after failure..."
            curl -v -f -m 5 http://localhost:3010/health || echo "Backend unreachable after test failure"
            curl -v -f -I -m 5 http://localhost:5183 || echo "Frontend unreachable after test failure"
            
            # Show logs after failure
            echo "Backend log (last 30 lines after failure):"
            tail -30 ../e2e-backend.log 2>/dev/null || echo "No backend log"
            
            echo "Frontend log (last 30 lines after failure):"
            tail -30 ../e2e-frontend.log 2>/dev/null || echo "No frontend log"
            
            echo "Playwright debug info:"
            npx playwright --version
            
            exit 1
          fi

            # Second: Run integration tests (live backend) - Re-enabled after broader URL validation update
            echo "Running integration tests against live backend..."
            if ! npx playwright test tests/youtube-download/integration.spec.ts \
              --timeout=60000 \
              --reporter=list,html \
              --max-failures=3; then
              
            echo "❌ Integration tests FAILED! Debug info already collected above."
            exit 1
          fi
          
      - name: Cleanup background servers
        if: always()
        run: |
          echo "Cleaning up background processes..."
          # Kill by stored PIDs
          if [ -f backend.pid ]; then
            BACKEND_PID=$(cat backend.pid)
            kill $BACKEND_PID 2>/dev/null || echo "Backend PID $BACKEND_PID not found"
            rm -f backend.pid
          fi
          if [ -f frontend.pid ]; then
            FRONTEND_PID=$(cat frontend.pid)
            kill $FRONTEND_PID 2>/dev/null || echo "Frontend PID $FRONTEND_PID not found"  
            rm -f frontend.pid
          fi
          # Fallback cleanup
          pkill -f "npm run dev" || echo "No npm dev processes to kill"
          pkill -f "ts-node-dev" || echo "No ts-node-dev processes to kill"
          pkill -f "vite.*--port 5183" || echo "No frontend processes to kill"
          # Final port cleanup
          pkill -f "npm.*3010" 2>/dev/null || true
          pkill -f "vite.*5183" 2>/dev/null || true
          sleep 2
        
      - name: Upload Playwright test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 30
          
      - name: Upload Playwright test videos
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-videos
          path: frontend/test-results/
          retention-days: 7

  # Level 5: Integration Tests
  integration:
    name: '🔗 Level 5: Integration'
    runs-on: ubuntu-latest
    needs: [e2e-tests]
    if: success()
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
            
      - name: Install dependencies
        run: npm ci

      - name: Install yt-dlp system binary
        run: |
          pip install --upgrade pip
          pip install yt-dlp
          # Create symlink for youtube-dl-exec package to find yt-dlp binary
          mkdir -p backend/node_modules/youtube-dl-exec/bin
          which yt-dlp
          ln -sf "$(which yt-dlp)" backend/node_modules/youtube-dl-exec/bin/yt-dlp
          echo "yt-dlp symlinked to $(readlink -f backend/node_modules/youtube-dl-exec/bin/yt-dlp)"
        timeout-minutes: 5
        
      - name: Build for production
        run: make build
        
      - name: Start production servers in background
        env:
          VIDEOS_DIR: /tmp/sofathek-videos
          TEMP_DIR: /tmp/sofathek-temp
        run: |
          echo "Starting production servers for integration testing..."

          # Create temp directories for health checks
          mkdir -p /tmp/sofathek-videos /tmp/sofathek-temp
          
          # Start backend in background
          cd backend
          PORT=3010 npm start &
          BACKEND_PID=$!
          echo "Backend started with PID: $BACKEND_PID"
          
          # Start frontend in background  
          cd ../frontend
          python3 -m http.server 5183 --directory dist &
          FRONTEND_PID=$!
          echo "Frontend started with PID: $FRONTEND_PID"
          
          # Store PIDs for cleanup
          echo $BACKEND_PID > /tmp/backend.pid
          echo $FRONTEND_PID > /tmp/frontend.pid
          
          # Wait for servers to be ready
          echo "Waiting for servers to be ready..."
          for i in {1..30}; do
            if curl -f http://localhost:3010/health >/dev/null 2>&1 && curl -f http://localhost:5183 >/dev/null 2>&1; then
              echo "Servers are ready!"
              break
            fi
            echo "Waiting for servers... ($i/30)"
            sleep 2
          done
          
      - name: Health check validation
        run: |
          # Test backend health endpoint
          curl -f http://localhost:3010/health || exit 1
          
          # Test frontend serves static files
          curl -f http://localhost:5183 || exit 1
          
      - name: Stop servers
        if: always()
        run: |
          echo "Stopping production servers..."
          # Kill by stored PIDs first (most reliable)
          if [ -f /tmp/backend.pid ]; then
            BACKEND_PID=$(cat /tmp/backend.pid)
            kill $BACKEND_PID 2>/dev/null || echo "Backend PID $BACKEND_PID not found"
          fi
          if [ -f /tmp/frontend.pid ]; then
            FRONTEND_PID=$(cat /tmp/frontend.pid)
            kill $FRONTEND_PID 2>/dev/null || echo "Frontend PID $FRONTEND_PID not found"
          fi
          
          # Fallback: Kill by process pattern
          pkill -f "PORT=3010" || echo "No backend process found"
          pkill -f "python3.*5183" || echo "No frontend process found"
          
          # Final fallback: Kill by port
          lsof -ti:3010 | xargs kill -9 2>/dev/null || echo "Port 3010 already free"
          lsof -ti:5183 | xargs kill -9 2>/dev/null || echo "Port 5183 already free"
          
          # Cleanup PID files
          rm -f /tmp/backend.pid /tmp/frontend.pid
          
          sleep 2
          echo "Servers stopped successfully"

  # Summary job for status checks
  ci-success:
    name: '✅ CI Pipeline Complete'
    runs-on: ubuntu-latest
    needs: [static-analysis, build-functional, unit-tests, e2e-tests, integration]
    if: success()
    
    steps:
      - name: CI Pipeline Success
        run: |
          echo "🎉 All CI pipeline levels completed successfully!"
          echo "✅ Level 1: Static Analysis - PASSED"
          echo "✅ Level 2: Build & Functional - PASSED"  
          echo "✅ Level 3: Unit Tests - PASSED"
          echo "✅ Level 4: E2E Tests - PASSED"
          echo "✅ Level 5: Integration - PASSED"
