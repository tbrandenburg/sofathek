name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

# Optimize: Avoid running duplicate jobs for push + PR
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '24.x'
  YOUTUBE_DL_SKIP_DOWNLOAD: 'true'

jobs:
  # Level 1: Static Analysis
  static-analysis:
    name: '🔍 Level 1: Static Analysis'
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci

      - name: Run TypeScript type checking
        run: make type-check
        
      - name: Run ESLint
        run: make lint

  # Level 2: Build and Functional
  build-functional:
    name: '🔨 Level 2: Build & Functional'
    runs-on: ubuntu-latest
    needs: static-analysis
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
            
      - name: Install dependencies
        run: npm ci

      - name: Build applications
        run: make build
        
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: |
            backend/dist/
            frontend/dist/
          retention-days: 7

  # Level 3: Unit Tests
  unit-tests:
    name: '🧪 Level 3: Unit Tests'
    runs-on: ubuntu-latest
    needs: static-analysis
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run backend unit tests
        run: |
          cd backend
          npm run test:unit
      
      - name: Run frontend unit tests
        run: |
          cd frontend
          npm test

  # Level 4: E2E Tests
  e2e-tests:
    name: '🎭 Level 4: E2E Tests'
    runs-on: ubuntu-latest
    needs: [build-functional, unit-tests]
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
            
      - name: Install dependencies
        run: npm ci

      - name: Install yt-dlp system binary
        run: |
          pip install --upgrade pip
          pip install yt-dlp
          # Create symlink for youtube-dl-exec package to find yt-dlp binary
          mkdir -p backend/node_modules/youtube-dl-exec/bin
          which yt-dlp
          ln -sf "$(which yt-dlp)" backend/node_modules/youtube-dl-exec/bin/yt-dlp
          echo "yt-dlp symlinked to $(readlink -f backend/node_modules/youtube-dl-exec/bin/yt-dlp)"
        timeout-minutes: 5
        
      - name: Install Playwright browsers
        run: make playwright-install
        
      - name: Start development servers in background
        env:
          VIDEOS_DIR: /tmp/sofathek-videos
          TEMP_DIR: /tmp/sofathek-temp
          NODE_ENV: development
        run: |
          echo "Starting servers directly for CI background execution..."

          # Create temp directories for health checks
          mkdir -p /tmp/sofathek-videos /tmp/sofathek-temp

          # Clean any existing processes on ports 3010 and 5183
          echo "Cleaning existing processes..."
          sudo lsof -ti:3010 2>/dev/null | xargs -r sudo kill -TERM 2>/dev/null || true
          sudo lsof -ti:5183 2>/dev/null | xargs -r sudo kill -TERM 2>/dev/null || true
          sleep 2
          sudo lsof -ti:3010,5183 2>/dev/null | xargs -r sudo kill -KILL 2>/dev/null || true
          
          # Start backend in background
          echo "Starting backend on port 3010..."
          cd backend
          nohup npm run dev > ../backend.log 2>&1 &
          BACKEND_PID=$!
          echo "Backend started with PID: $BACKEND_PID"
          echo $BACKEND_PID > ../backend.pid
          cd ..
          
          # Wait and start frontend in background
          echo "Waiting for backend to initialize..."
          sleep 5
          
          echo "Starting frontend on port 5183..."
          cd frontend 
          nohup npm run dev -- --port 5183 --host 0.0.0.0 > ../frontend.log 2>&1 &
          FRONTEND_PID=$!
          echo "Frontend started with PID: $FRONTEND_PID"
          echo $FRONTEND_PID > ../frontend.pid
          cd ..
          
          # Wait for services to initialize
          echo "Waiting 30 seconds for services to fully start..."
          sleep 30
          
          # Health checks with detailed logging
          echo "Checking backend availability..."
          for i in {1..15}; do
            if curl -f -s http://localhost:3010/health > /dev/null; then
              echo "✅ Backend is responding"
              curl -s http://localhost:3010/health | head -2
              break
            fi
            echo "Backend check $i/15..."
            sleep 2
          done
          
          echo "Checking frontend availability..."
          for i in {1..15}; do  
            if curl -f -s -I http://localhost:5183 > /dev/null; then
              echo "✅ Frontend is responding"
              curl -s -I http://localhost:5183 | head -2
              break
            fi
            echo "Frontend check $i/15..."
            sleep 2
          done
          
          # Final connectivity test
          echo "Final server status checks:"
          echo "Backend:" && timeout 5 curl -s http://localhost:3010/health | head -1 || echo "Backend timeout"
          echo "Frontend:" && timeout 5 curl -s -I http://localhost:5183 | head -1 || echo "Frontend timeout"
          
          echo "Servers are ready. Adding stability wait for E2E tests..."
          
          # Brief wait to ensure servers are fully stable for browser automation
          sleep 3
          
          echo "Starting E2E tests with enhanced configuration..."
          
      - name: Run Playwright E2E tests
        run: |
          echo "Running minimal CI-focused E2E tests..."
          cd frontend
          
          # Enhanced server verification with restart capability
          echo "Checking server status before E2E tests..."
          
          # Check if backend is still running
          if ! curl -f -s http://localhost:3010/health > /dev/null; then
            echo "❌ Backend not responding, checking process status..."
            if [ -f ../backend.pid ]; then
              BACKEND_PID=$(cat ../backend.pid)
              if ! ps -p "$BACKEND_PID" > /dev/null 2>&1; then
                echo "Backend process $BACKEND_PID has died, restarting..."
                cd ../backend
                nohup npm run dev > ../backend.log 2>&1 &
                NEW_BACKEND_PID=$!
                echo $NEW_BACKEND_PID > ../backend.pid
                cd ../frontend
                echo "New backend started with PID: $NEW_BACKEND_PID"
                sleep 10
              fi
            else
              echo "No backend PID file found, restarting backend..."
              cd ../backend
              nohup npm run dev > ../backend.log 2>&1 &
              NEW_BACKEND_PID=$!
              echo $NEW_BACKEND_PID > ../backend.pid
              cd ../frontend
              echo "Backend started with PID: $NEW_BACKEND_PID"
              sleep 10
            fi
          fi
          
          # Check if frontend is still running  
          if ! curl -f -s -I http://localhost:5183 > /dev/null; then
            echo "❌ Frontend not responding, checking process status..."
            if [ -f ../frontend.pid ]; then
              FRONTEND_PID=$(cat ../frontend.pid)
              if ! ps -p "$FRONTEND_PID" > /dev/null 2>&1; then
                echo "Frontend process $FRONTEND_PID has died, restarting..."
                nohup npm run dev -- --port 5183 --host 0.0.0.0 > ../frontend.log 2>&1 &
                NEW_FRONTEND_PID=$!
                echo $NEW_FRONTEND_PID > ../frontend.pid
                echo "New frontend started with PID: $NEW_FRONTEND_PID"
                sleep 10
              fi
            else
              echo "No frontend PID file found, restarting frontend..."
              nohup npm run dev -- --port 5183 --host 0.0.0.0 > ../frontend.log 2>&1 &
              NEW_FRONTEND_PID=$!
              echo $NEW_FRONTEND_PID > ../frontend.pid
              echo "Frontend started with PID: $NEW_FRONTEND_PID"
              sleep 10
            fi
          fi
          
          # Final verification with detailed logging
          echo "Final server verification with debug info:"
          echo "Backend status:"
          if curl -f -s http://localhost:3010/health; then
            echo "✅ Backend is responding"
          else
            echo "❌ Backend health check failed"
            echo "Backend log (last 20 lines):"
            tail -20 ../backend.log 2>/dev/null || echo "No backend log found"
            echo "Backend process status:"
            cat ../backend.pid 2>/dev/null | xargs -I {} sh -c 'echo "PID: {}"; ps -p {} || echo "Process not found"'
            exit 1
          fi
          
          echo "Frontend status:"  
          if curl -f -s -I http://localhost:5183; then
            echo "✅ Frontend is responding"
          else
            echo "❌ Frontend health check failed" 
            echo "Frontend log (last 20 lines):"
            tail -20 ../frontend.log 2>/dev/null || echo "No frontend log found"
            echo "Frontend process status:"
            cat ../frontend.pid 2>/dev/null | xargs -I {} sh -c 'echo "PID: {}"; ps -p {} || echo "Process not found"'
            exit 1
          fi
          
          # Set CI-specific environment variables for Playwright
          export CI=true
          
           # First: Run minimal connectivity test
          npx playwright test ci-minimal.spec.ts \
            --timeout=60000 \
            --reporter=list \
            --max-failures=1 \
            --retries=1

          # Second: Run integration tests (live backend) - Re-enabled after broader URL validation update
          echo "Running integration tests against live backend..."
          npx playwright test youtube-download/integration.spec.ts \
            --timeout=60000 \
            --reporter=list \
            --max-failures=3
          
      - name: Cleanup background servers
        if: always()
        run: |
          echo "Cleaning up background processes..."
          # Kill by stored PIDs
          if [ -f backend.pid ]; then
            BACKEND_PID=$(cat backend.pid)
            kill $BACKEND_PID 2>/dev/null || echo "Backend PID $BACKEND_PID not found"
            rm -f backend.pid
          fi
          if [ -f frontend.pid ]; then
            FRONTEND_PID=$(cat frontend.pid)
            kill $FRONTEND_PID 2>/dev/null || echo "Frontend PID $FRONTEND_PID not found"  
            rm -f frontend.pid
          fi
          # Fallback cleanup
          pkill -f "PORT=3010" || echo "No backend processes to kill"
          pkill -f "vite.*--port 5183" || echo "No frontend processes to kill"
          # Final port cleanup
          sudo lsof -ti:3010 2>/dev/null | xargs -r sudo kill -KILL 2>/dev/null || true
          sudo lsof -ti:5183 2>/dev/null | xargs -r sudo kill -KILL 2>/dev/null || true
          sleep 2
        
      - name: Upload Playwright test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 30
          
      - name: Upload Playwright test videos
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-videos
          path: frontend/test-results/
          retention-days: 7

  # Level 5: Integration Tests
  integration:
    name: '🔗 Level 5: Integration'
    runs-on: ubuntu-latest
    needs: [e2e-tests]
    if: success()
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
            
      - name: Install dependencies
        run: npm ci

      - name: Install yt-dlp system binary
        run: |
          pip install --upgrade pip
          pip install yt-dlp
          # Create symlink for youtube-dl-exec package to find yt-dlp binary
          mkdir -p backend/node_modules/youtube-dl-exec/bin
          which yt-dlp
          ln -sf "$(which yt-dlp)" backend/node_modules/youtube-dl-exec/bin/yt-dlp
          echo "yt-dlp symlinked to $(readlink -f backend/node_modules/youtube-dl-exec/bin/yt-dlp)"
        timeout-minutes: 5
        
      - name: Build for production
        run: make build
        
      - name: Start production servers in background
        env:
          VIDEOS_DIR: /tmp/sofathek-videos
          TEMP_DIR: /tmp/sofathek-temp
        run: |
          echo "Starting production servers for integration testing..."

          # Create temp directories for health checks
          mkdir -p /tmp/sofathek-videos /tmp/sofathek-temp
          
          # Start backend in background
          cd backend
          PORT=3010 npm start &
          BACKEND_PID=$!
          echo "Backend started with PID: $BACKEND_PID"
          
          # Start frontend in background  
          cd ../frontend
          python3 -m http.server 5183 --directory dist &
          FRONTEND_PID=$!
          echo "Frontend started with PID: $FRONTEND_PID"
          
          # Store PIDs for cleanup
          echo $BACKEND_PID > /tmp/backend.pid
          echo $FRONTEND_PID > /tmp/frontend.pid
          
          # Wait for servers to be ready
          echo "Waiting for servers to be ready..."
          for i in {1..30}; do
            if curl -f http://localhost:3010/health >/dev/null 2>&1 && curl -f http://localhost:5183 >/dev/null 2>&1; then
              echo "Servers are ready!"
              break
            fi
            echo "Waiting for servers... ($i/30)"
            sleep 2
          done
          
      - name: Health check validation
        run: |
          # Test backend health endpoint
          curl -f http://localhost:3010/health || exit 1
          
          # Test frontend serves static files
          curl -f http://localhost:5183 || exit 1
          
      - name: Stop servers
        if: always()
        run: |
          echo "Stopping production servers..."
          # Kill by stored PIDs first (most reliable)
          if [ -f /tmp/backend.pid ]; then
            BACKEND_PID=$(cat /tmp/backend.pid)
            kill $BACKEND_PID 2>/dev/null || echo "Backend PID $BACKEND_PID not found"
          fi
          if [ -f /tmp/frontend.pid ]; then
            FRONTEND_PID=$(cat /tmp/frontend.pid)
            kill $FRONTEND_PID 2>/dev/null || echo "Frontend PID $FRONTEND_PID not found"
          fi
          
          # Fallback: Kill by process pattern
          pkill -f "PORT=3010" || echo "No backend process found"
          pkill -f "python3.*5183" || echo "No frontend process found"
          
          # Final fallback: Kill by port
          lsof -ti:3010 | xargs kill -9 2>/dev/null || echo "Port 3010 already free"
          lsof -ti:5183 | xargs kill -9 2>/dev/null || echo "Port 5183 already free"
          
          # Cleanup PID files
          rm -f /tmp/backend.pid /tmp/frontend.pid
          
          sleep 2
          echo "Servers stopped successfully"

  # Summary job for status checks
  ci-success:
    name: '✅ CI Pipeline Complete'
    runs-on: ubuntu-latest
    needs: [static-analysis, build-functional, unit-tests, e2e-tests, integration]
    if: success()
    
    steps:
      - name: CI Pipeline Success
        run: |
          echo "🎉 All CI pipeline levels completed successfully!"
          echo "✅ Level 1: Static Analysis - PASSED"
          echo "✅ Level 2: Build & Functional - PASSED"  
          echo "✅ Level 3: Unit Tests - PASSED"
          echo "✅ Level 4: E2E Tests - PASSED"
          echo "✅ Level 5: Integration - PASSED"
