name: Release Pipeline

on:
  push:
    tags:
      - 'v*'  # Trigger on version tags like v1.0.0, v1.5.0, etc.

env:
  REGISTRY_IMAGE: sofathek/sofathek
  SOFATHEK_BACKEND_PORT: '3010'
  SOFATHEK_FRONTEND_PORT: '8010'

jobs:
  # Build and publish Docker images
  docker-release:
    name: '🐳 Docker Release'
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        
      - name: Set up QEMU for multi-platform builds
        uses: docker/setup-qemu-action@v3
        
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          
      - name: Extract metadata for backend
        id: meta-backend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY_IMAGE }}-backend
          tags: |
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
          labels: |
            org.opencontainers.image.title=Sofathek Backend
            org.opencontainers.image.description=Backend API server for Sofathek family media center
            org.opencontainers.image.vendor=Thomas Brandenburg
            
      - name: Extract metadata for frontend
        id: meta-frontend  
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY_IMAGE }}-frontend
          tags: |
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
          labels: |
            org.opencontainers.image.title=Sofathek Frontend
            org.opencontainers.image.description=Netflix-like frontend interface for Sofathek family media center
            org.opencontainers.image.vendor=Thomas Brandenburg
            
      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta-backend.outputs.tags }}
          labels: ${{ steps.meta-backend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          
      - name: Setup Node.js for frontend build
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
          
      - name: Install frontend dependencies and build
        run: |
          cd frontend
          npm ci
          npm run build
          
      - name: Create frontend Dockerfile
        run: |
          cat > frontend/Dockerfile.release << 'EOF'
          # Multi-stage Dockerfile for Sofathek Frontend
          FROM nginx:alpine AS runtime
          
          # Copy built frontend files
          COPY dist/ /usr/share/nginx/html/
          
          # Copy nginx configuration
          COPY nginx.conf /etc/nginx/nginx.conf
          
          # Create non-root user for security
          RUN addgroup -g 1001 -S sofathek && \
              adduser -S sofathek -u 1001 -G sofathek && \
              chown -R sofathek:sofathek /usr/share/nginx/html /var/cache/nginx /var/run /var/log/nginx
          
          # Switch to non-root user
          USER sofathek
          
          # Expose port
          EXPOSE 8010
          
          # Health check
          HEALTHCHECK --interval=30s --timeout=10s --start-period=40s --retries=3 \
              CMD wget --no-verbose --tries=1 --spider http://localhost:8010/ || exit 1
          
          # Start nginx
          CMD ["nginx", "-g", "daemon off;"]
          EOF
          
      - name: Create nginx configuration
        run: |
          cat > frontend/nginx.conf << 'EOF'
          events {
              worker_connections 1024;
          }
          
          http {
              include       /etc/nginx/mime.types;
              default_type  application/octet-stream;
              
              sendfile        on;
              keepalive_timeout  65;
              
              server {
                  listen       8010;
                  listen  [::]:8010;
                  server_name  localhost;
                  
                  root   /usr/share/nginx/html;
                  index  index.html index.htm;
                  
                  # Handle client-side routing
                  location / {
                      try_files $uri $uri/ /index.html;
                  }
                  
                  # Cache static assets
                  location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
                      expires 1y;
                      add_header Cache-Control "public, immutable";
                  }
                  
                  # Security headers
                  add_header X-Frame-Options "SAMEORIGIN" always;
                  add_header X-Content-Type-Options "nosniff" always;
                  add_header X-XSS-Protection "1; mode=block" always;
              }
          }
          EOF
          
      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile.release
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta-frontend.outputs.tags }}
          labels: ${{ steps.meta-frontend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Create GitHub release with changelog
  github-release:
    name: '📋 GitHub Release'
    runs-on: ubuntu-latest
    needs: docker-release
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0  # Fetch all history for changelog generation
          
      - name: Generate release notes
        id: changelog
        run: |
          # Extract version from tag
          VERSION=${GITHUB_REF#refs/tags/}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          
          # Generate changelog from commits since last tag
          LAST_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -n "$LAST_TAG" ]; then
            CHANGELOG=$(git log $LAST_TAG..HEAD --pretty=format:"- %s (%h)" --no-merges)
          else
            CHANGELOG=$(git log --pretty=format:"- %s (%h)" --no-merges)
          fi
          
          # Create release notes
          cat > release-notes.md << EOF
          ## What's Changed
          
          $CHANGELOG
          
          ## Docker Images
          
          ### Backend
          \`\`\`bash
          docker pull sofathek/sofathek-backend:$VERSION
          \`\`\`
          
          ### Frontend  
          \`\`\`bash
          docker pull sofathek/sofathek-frontend:$VERSION
          \`\`\`
          
          ## Full Deployment
          
          See [DEPLOYMENT.md](./docs/DEPLOYMENT.md) for complete setup instructions.
          
          **Full Changelog**: https://github.com/\${{ github.repository }}/compare/$LAST_TAG...$VERSION
          EOF
          
      - name: Create GitHub Release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref_name }}
          release_name: Release ${{ steps.changelog.outputs.version }}
          body_path: release-notes.md
          draft: false
          prerelease: false

  # Notification and summary
  release-complete:
    name: '✅ Release Complete'
    runs-on: ubuntu-latest
    needs: [docker-release, github-release]
    if: success()
    
    steps:
      - name: Release Summary
        run: |
          echo "🎉 Release ${{ github.ref_name }} completed successfully!"
          echo ""
          echo "📦 Docker Images Published:"
          echo "  - sofathek/sofathek-backend:${{ github.ref_name }}"  
          echo "  - sofathek/sofathek-frontend:${{ github.ref_name }}"
          echo ""
          echo "🔗 GitHub Release: https://github.com/${{ github.repository }}/releases/tag/${{ github.ref_name }}"
          echo ""
          echo "🚀 Ready for deployment using docs/DEPLOYMENT.md"